<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>budijoi · Repositori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 880px; margin: 0 auto; padding: 40px 24px 24px; flex: 1; }

    nav {
      display: flex;
      gap: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 12px;
      margin-bottom: 32px;
    }
    nav a {
      color: #8b949e;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding-bottom: 12px;
      border-bottom: 2px solid transparent;
      margin-bottom: -13px;
      transition: color .2s;
    }
    nav a:hover { color: #e6edf3; }
    nav a.active { color: #f78166; border-bottom-color: #f78166; }

    header { margin-bottom: 8px; }
    header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
    header h1 a { color: #e6edf3; text-decoration: none; }
    header h1 a:hover { color: #58a6ff; }
    .stats { display: flex; gap: 24px; margin-top: 8px; font-size: 14px; color: #8b949e; }

    .repo-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .repo-card {
      background: #151b23;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px 22px;
      transition: border-color .2s;
    }
    .repo-card:hover { border-color: #58a6ff; }
    .repo-card a { text-decoration: none; }
    .repo-name { font-size: 16px; font-weight: 600; color: #58a6ff; }
    .repo-name:hover { text-decoration: underline; }
    .repo-desc { color: #8b949e; font-size: 14px; margin-top: 5px; line-height: 1.5; }
    .repo-meta {
      display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px;
      font-size: 13px; color: #8b949e; align-items: center;
    }
    .repo-meta .lang-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
    .repo-meta .fork-label {
      display: inline-flex; align-items: center; gap: 4px;
      background: #21262d; padding: 2px 8px; border-radius: 12px; font-size: 12px; color: #8b949e;
    }

    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 28px; flex-wrap: wrap;
    }
    .pagination button {
      background: #21262d; border: 1px solid #30363d; color: #e6edf3;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-family: inherit; transition: border-color .2s;
    }
    .pagination button:hover:not(:disabled) { border-color: #58a6ff; }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination .page-info { color: #8b949e; font-size: 14px; padding: 0 8px; }
    .pagination .page-num {
      background: transparent; border: 1px solid #30363d; color: #8b949e;
      min-width: 34px; height: 34px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-family: inherit; transition: all .2s;
    }
    .pagination .page-num:hover { border-color: #58a6ff; color: #e6edf3; }
    .pagination .page-num.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    .loading { text-align: center; color: #8b949e; padding: 60px 0; }
    .loading .spinner {
      width: 30px; height: 30px; border: 3px solid #30363d;
      border-top-color: #58a6ff; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; text-align: center; padding: 60px 0; }

    footer { text-align: center; padding: 24px; color: #484f58; font-size: 13px; }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html" class="active">Repositori</a>
      <a href="profile.html">Profil</a>
    </nav>
    <header>
      <h1><a href="https://github.com/budijoi">budijoi</a></h1>
      <div class="stats">
        <span id="repo-count">--</span>
      </div>
    </header>
    <div id="repo-list" class="repo-list">
      <div class="loading">
        <div class="spinner"></div>
        Memuat repositori...
      </div>
    </div>
    <div id="pagination" class="pagination"></div>
  </div>
  <footer>
    <a href="https://github.com/budijoi">github.com/budijoi</a>
  </footer>

  <script>
    const PER_PAGE = 10;
    let allRepos = [];
    let currentPage = 1;

    const container = document.getElementById('repo-list');
    const countEl = document.getElementById('repo-count');
    const paginationEl = document.getElementById('pagination');

    const langColors = {
      JavaScript: '#f1e05a', Python: '#3572A5', HTML: '#e34c26',
      Shell: '#89e051', CSS: '#563d7c', TypeScript: '#3178c6',
      PHP: '#4F5D95', Ruby: '#701516', Go: '#00ADD8',
      Rust: '#dea584', Java: '#b07219', C: '#555555',
      'C++': '#f34b7d', 'C#': '#178600', Kotlin: '#A97BFF',
      Dart: '#00B4AB', Swift: '#F05138', Scala: '#c22d40',
    };

    (async () => {
      try {
        const res = await fetch('https://api.github.com/users/budijoi/repos?sort=updated&per_page=100&type=owner');
        if (!res.ok) throw new Error('Gagal memuat repositori');
        allRepos = await res.json();

        countEl.textContent = allRepos.length + ' repositori';
        if (allRepos.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#8b949e;padding:60px 0;">Belum ada repositori.</p>';
          return;
        }
        render();
      } catch (e) {
        container.innerHTML = '<div class="error">Gagal memuat repositori. Coba lagi nanti.</div>';
        console.error(e);
      }
    })();

    function render() {
      const totalPages = Math.ceil(allRepos.length / PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PER_PAGE;
      const pageRepos = allRepos.slice(start, start + PER_PAGE);

      container.innerHTML = pageRepos.map(repo => {
        const desc = repo.description || '';
        const lang = repo.language || '';
        const color = langColors[lang] || '#8b949e';
        return `
          <div class="repo-card">
            <a href="${repo.html_url}"><span class="repo-name">${escHtml(repo.name)}</span></a>
            ${desc ? `<div class="repo-desc">${escHtml(desc)}</div>` : ''}
            <div class="repo-meta">
              ${lang ? `<span><span class="lang-dot" style="background:${color}"></span>${lang}</span>` : ''}
              ${repo.stargazers_count > 0 ? `<span>${repo.stargazers_count} ★</span>` : ''}
              ${repo.forks_count > 0 ? `<span>${repo.forks_count} 🍴</span>` : ''}
              ${repo.fork ? '<span class="fork-label">Fork</span>' : ''}
              <span>Diperbarui ${timeAgo(repo.pushed_at)}</span>
            </div>
          </div>
        `;
      }).join('');

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) { paginationEl.innerHTML = ''; return; }

      let html = '';
      html += `<button class="page-num" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, startPage + 4);
      if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-num${i === currentPage ? ' active' : ''}" data-page="${i}">${i}</button>`;
      }

      html += `<button class="page-num" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
      html += `<span class="page-info">${currentPage}/${totalPages}</span>`;

      paginationEl.innerHTML = html;

      paginationEl.querySelectorAll('.page-num:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
          const page = parseInt(btn.dataset.page);
          if (page !== currentPage) { currentPage = page; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        });
      });
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'baru saja';
      if (diff < 3600) return Math.floor(diff / 60) + ' menit lalu';
      if (diff < 86400) return Math.floor(diff / 3600) + ' jam lalu';
      if (diff < 2592000) return Math.floor(diff / 86400) + ' hari lalu';
      if (diff < 31536000) return Math.floor(diff / 2592000) + ' bulan lalu';
      return Math.floor(diff / 31536000) + ' tahun lalu';
    }
  </script>
</body>
</html>
