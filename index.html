<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUDIJOI - Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for reactive data binding & state management -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Inter & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        /* Custom styles for animations */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .theme-gradient-purple {
            background: radial-gradient(circle at top left, #3b0764, #0f172a 60%), radial-gradient(circle at bottom right, #0284c7, #0f172a);
        }
        .theme-gradient-emerald {
            background: radial-gradient(circle at top left, #064e3b, #0f172a 60%), radial-gradient(circle at bottom right, #047857, #0f172a);
        }
        .theme-gradient-sunset {
            background: radial-gradient(circle at top left, #7c2d12, #0f172a 60%), radial-gradient(circle at bottom right, #be123c, #0f172a);
        }
        .theme-gradient-dark {
            background: radial-gradient(circle at top left, #1e293b, #090d16 60%), radial-gradient(circle at bottom right, #0f172a, #090d16);
        }
    </style>
</head>
<body 
    x-data="portfolioApp()" 
    :class="themes[currentTheme].class" 
    class="min-h-screen text-slate-100 transition-all duration-700 ease-in-out font-sans overflow-x-hidden relative flex flex-col justify-between"
>
    <!-- Background glowing ambient bubbles -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-purple-500/10 blur-[100px] animate-pulse-slow"></div>
        <div class="absolute top-1/2 -right-40 w-96 h-96 rounded-full bg-sky-500/10 blur-[100px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- MAIN CONTAINER -->
    <main class="container mx-auto max-w-2xl px-4 py-12 z-10 flex-grow">
        
        <!-- HEADER MODE EDIT / PREVIEW -->
        <div class="flex justify-between items-center mb-8 glass-card rounded-2xl p-3.5 shadow-xl relative z-30">
            <div class="flex items-center gap-2">
                <span class="flex h-3 w-3 relative">
                    <span :class="isEditing ? 'bg-amber-400' : 'bg-emerald-400'" class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
                    <span :class="isEditing ? 'bg-amber-500' : 'bg-emerald-500'" class="relative inline-flex rounded-full h-3 w-3"></span>
                </span>
                <span class="text-xs font-semibold tracking-wider uppercase text-slate-300" x-text="isEditing ? 'Mode Edit Aktif' : 'Mode Publik / Live'"></span>
            </div>
            
            <div class="flex items-center gap-2.5">
                <!-- Theme Swapper inside Controls -->
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" class="p-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-300 transition-colors text-xs flex items-center gap-1.5" title="Ganti Tema">
                        <i class="fa-solid fa-palette text-sm"></i>
                        <span class="hidden sm:inline" x-text="themes[currentTheme].name"></span>
                    </button>
                    <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-40 rounded-xl bg-slate-900 border border-white/10 p-1.5 shadow-2xl z-50" x-transition>
                        <template x-for="(theme, index) in themes" :key="index">
                            <button 
                                @click="currentTheme = index; open = false; saveToLocalStorage()" 
                                class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium hover:bg-white/5 flex items-center justify-between transition-colors"
                                :class="currentTheme === index ? 'text-indigo-400 bg-white/5' : 'text-slate-400'"
                            >
                                <span x-text="theme.name"></span>
                                <span class="w-3.5 h-3.5 rounded-full border border-white/20" :class="theme.dotClass"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Live Toggle Switch for Editing -->
                <button 
                    @click="toggleEditMode()" 
                    :class="isEditing ? 'bg-amber-500 hover:bg-amber-600 text-slate-950' : 'bg-white/10 hover:bg-white/15 text-white'"
                    class="px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5 shadow-md active:scale-95"
                >
                    <i :class="isEditing ? 'fa-solid fa-circle-check' : 'fa-solid fa-pen-to-square'"></i>
                    <span x-text="isEditing ? 'Selesai Edit' : 'Edit Halaman'"></span>
                </button>
            </div>
        </div>

        <!-- PROFILE CARD -->
        <div class="glass-card rounded-3xl p-6 sm:p-8 text-center shadow-2xl relative mb-8 transition-all duration-300 group">
            
            <!-- Avatar Section -->
            <div class="relative inline-block mb-4">
                <div class="relative w-28 h-28 sm:w-32 sm:h-32 rounded-full mx-auto p-1.5 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 shadow-xl overflow-hidden group">
                    <img 
                        :src="profile.avatar" 
                        alt="Profile Avatar" 
                        class="w-full h-full object-cover rounded-full"
                        @error="profile.avatar = 'https://placehold.co/150x150/1e293b/ffffff?text=BUDIJOI'"
                    >
                </div>
                
                <!-- Edit Avatar Indicator Button -->
                <button 
                    x-show="isEditing" 
                    @click="editAvatarPrompt()"
                    class="absolute bottom-1 right-1 bg-indigo-500 hover:bg-indigo-600 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg transition-transform hover:scale-105 active:scale-95 border-2 border-slate-900"
                    title="Ganti Foto"
                >
                    <i class="fa-solid fa-camera text-sm"></i>
                </button>
            </div>

            <!-- Profile Info Elements (Interactive on click if editing) -->
            <div>
                <!-- Display Name / Editable Input -->
                <div class="mb-2">
                    <template x-if="!isEditing">
                        <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-white" x-text="profile.name"></h1>
                    </template>
                    <template x-if="isEditing">
                        <input 
                            type="text" 
                            x-model="profile.name" 
                            @input="saveToLocalStorage()"
                            class="text-center text-xl sm:text-2xl font-bold bg-white/5 border border-white/20 rounded-xl px-3 py-1 text-white focus:outline-none focus:border-indigo-500 w-full max-w-xs mx-auto"
                            placeholder="Nama Profil"
                        >
                    </template>
                </div>

                <!-- Display Subtitle / Tagline -->
                <div class="mb-4">
                    <template x-if="!isEditing">
                        <p class="text-sm sm:text-base text-slate-400 font-medium max-w-md mx-auto" x-text="profile.bio"></p>
                    </template>
                    <template x-if="isEditing">
                        <textarea 
                            x-model="profile.bio" 
                            @input="saveToLocalStorage()"
                            rows="2"
                            class="text-center text-sm bg-white/5 border border-white/20 rounded-xl px-3 py-2 text-slate-300 focus:outline-none focus:border-indigo-500 w-full max-w-md mx-auto"
                            placeholder="Deskripsi singkat portofolio Anda..."
                        ></textarea>
                    </template>
                </div>

                <!-- Badges or Extra Social Handles (Editable URL in edit mode) -->
                <div class="flex items-center justify-center gap-3 text-slate-400 text-sm">
                    <span class="flex items-center gap-1.5 bg-white/5 px-3 py-1 rounded-full border border-white/5 text-xs">
                        <i class="fa-solid fa-calendar-check text-indigo-400"></i>
                        <span>Est. 2026</span>
                    </span>
                    <span class="flex items-center gap-1.5 bg-white/5 px-3 py-1 rounded-full border border-white/5 text-xs">
                        <i class="fa-solid fa-circle text-emerald-400 animate-pulse"></i>
                        <span>Tersedia untuk Proyek</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- LIST OF LINKS -->
        <div class="space-y-4">
            
            <!-- Loop through custom link buttons -->
            <template x-for="(link, index) in links" :key="link.id">
                <div 
                    class="relative group rounded-2xl transition-all duration-300"
                    :class="isEditing ? 'bg-slate-900/40 p-5 border border-white/10' : 'transform hover:-translate-y-1 hover:shadow-xl active:scale-[0.99]'"
                >
                    <!-- NORMAL LIVE PORTFOLIO BUTTON VIEW -->
                    <template x-if="!isEditing">
                        <a 
                            :href="link.url" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            class="glass-card rounded-2xl p-4 flex items-center justify-between gap-4 transition-all duration-300 w-full group-hover:bg-white/10"
                        >
                            <div class="flex items-center gap-4 text-left">
                                <!-- Dynamic Icon based on Link Content or Default Pin -->
                                <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 border border-indigo-500/20 group-hover:bg-indigo-500/20 group-hover:scale-105 transition-all">
                                    <i :class="getIconClass(link.url)" class="text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-white text-base group-hover:text-indigo-300 transition-colors" x-text="link.title"></h3>
                                    <p class="text-xs text-slate-400 mt-0.5 line-clamp-1" x-text="link.description"></p>
                                </div>
                            </div>
                            <div class="text-slate-400 group-hover:text-white transition-colors">
                                <i class="fa-solid fa-chevron-right text-sm"></i>
                            </div>
                        </a>
                    </template>

                    <!-- EDIT MODE VIEW (Form Inputs) -->
                    <template x-if="isEditing">
                        <div class="space-y-3.5">
                            
                            <!-- Header Action Link Row (Delete / Move) -->
                            <div class="flex justify-between items-center border-b border-white/5 pb-2 mb-2">
                                <span class="text-xs font-bold text-indigo-400 uppercase tracking-widest">
                                    Tautan #<span x-text="index + 1"></span>
                                </span>
                                <div class="flex items-center gap-1.5">
                                    <!-- Order Up Button -->
                                    <button 
                                        @click="moveLinkUp(index)" 
                                        :disabled="index === 0"
                                        class="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 disabled:opacity-30 disabled:pointer-events-none transition-colors"
                                        title="Pindah ke Atas"
                                    >
                                        <i class="fa-solid fa-arrow-up text-xs"></i>
                                    </button>
                                    <!-- Order Down Button -->
                                    <button 
                                        @click="moveLinkDown(index)" 
                                        :disabled="index === links.length - 1"
                                        class="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-white/5 disabled:opacity-30 disabled:pointer-events-none transition-colors"
                                        title="Pindah ke Bawah"
                                    >
                                        <i class="fa-solid fa-arrow-down text-xs"></i>
                                    </button>
                                    <!-- Delete Button -->
                                    <button 
                                        @click="deleteLink(link.id)" 
                                        class="p-1.5 rounded-lg text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 transition-colors"
                                        title="Hapus Tautan"
                                    >
                                        <i class="fa-solid fa-trash-can text-xs"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Input Grid -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <!-- Title Input -->
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Nama Tombol</label>
                                    <input 
                                        type="text" 
                                        x-model="link.title" 
                                        @input="saveToLocalStorage()"
                                        class="w-full text-xs bg-slate-950/50 border border-white/10 focus:border-indigo-500 rounded-lg px-2.5 py-2 text-white placeholder-slate-500 focus:outline-none"
                                        placeholder="Contoh: Portofolio Utama"
                                    >
                                </div>
                                <!-- Description Input -->
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Deskripsi Singkat</label>
                                    <input 
                                        type="text" 
                                        x-model="link.description" 
                                        @input="saveToLocalStorage()"
                                        class="w-full text-xs bg-slate-950/50 border border-white/10 focus:border-indigo-500 rounded-lg px-2.5 py-2 text-white placeholder-slate-500 focus:outline-none"
                                        placeholder="Contoh: Projek pilihan tahun lalu"
                                    >
                                </div>
                            </div>
                            
                            <!-- URL Input -->
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Alamat URL</label>
                                <div class="relative flex items-center">
                                    <span class="absolute left-3 text-slate-500 text-xs">
                                        <i class="fa-solid fa-link"></i>
                                    </span>
                                    <input 
                                        type="url" 
                                        x-model="link.url" 
                                        @input="saveToLocalStorage()"
                                        class="w-full text-xs bg-slate-950/50 border border-white/10 focus:border-indigo-500 rounded-lg pl-9 pr-3 py-2 text-white placeholder-slate-500 focus:outline-none"
                                        placeholder="https://contoh.com/halaman"
                                    >
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- NO LINKS EMPTY STATE -->
            <template x-if="links.length === 0">
                <div class="glass-card rounded-2xl p-8 text-center text-slate-400">
                    <i class="fa-regular fa-folder-open text-3xl mb-3 text-slate-500"></i>
                    <p class="text-sm">Belum ada tautan ditambahkan.</p>
                    <p class="text-xs text-slate-500 mt-1">Aktifkan Mode Edit lalu klik "Tambah Tautan Baru".</p>
                </div>
            </template>

            <!-- ADD NEW LINK BUTTON (Visible only when Editing) -->
            <div x-show="isEditing" class="pt-4">
                <button 
                    @click="addNewLink()"
                    class="w-full py-4 rounded-2xl border-2 border-dashed border-indigo-500/30 hover:border-indigo-500 bg-indigo-500/5 hover:bg-indigo-500/10 text-indigo-300 font-bold text-sm transition-all flex items-center justify-center gap-2"
                >
                    <i class="fa-solid fa-circle-plus"></i>
                    <span>Tambah Tautan Baru</span>
                </button>
            </div>

        </div>

        <!-- SPECIAL UTILITY: BACKUP CONFIG (Only in Edit Mode) -->
        <div x-show="isEditing" class="mt-8 pt-8 border-t border-white/5">
            <div class="glass-card rounded-2xl p-4">
                <h4 class="text-xs font-bold text-slate-300 mb-1 uppercase tracking-wider">Ekspor / Impor Portofolio</h4>
                <p class="text-[11px] text-slate-400 mb-3">Salin konfigurasi JSON ini untuk mencadangkan data portofolio Anda.</p>
                <div class="flex gap-2">
                    <button 
                        @click="copyConfigToClipboard()" 
                        class="px-3 py-1.5 rounded-lg bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-semibold flex items-center gap-1.5 transition-colors"
                    >
                        <i class="fa-regular fa-copy"></i> Salin JSON
                    </button>
                    <button 
                        @click="importConfigPrompt()" 
                        class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 text-slate-300 text-xs font-semibold flex items-center gap-1.5 transition-colors"
                    >
                        <i class="fa-solid fa-file-import"></i> Impor JSON
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="w-full text-center py-8 z-10 border-t border-white/5 bg-slate-950/30 backdrop-blur-sm mt-12">
        <div class="container mx-auto max-w-2xl px-4 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs text-slate-500">
            <div class="flex items-center gap-1.5">
                <span class="font-bold tracking-wider text-slate-400">BUDIJOI</span>
                <span>&copy; 2026. Seluruh hak cipta dilindungi.</span>
            </div>
            <div class="flex gap-4">
                <a href="#" class="hover:text-indigo-400 transition-colors">Privasi</a>
                <a href="#" class="hover:text-indigo-400 transition-colors">Syarat Layanan</a>
                <a href="mailto:hello@budijoi.com" class="hover:text-indigo-400 transition-colors">Hubungi</a>
            </div>
        </div>
    </footer>

    <!-- MODAL CUSTOM ALERTS -->
    <div 
        x-show="alertMessage !== ''" 
        class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50"
        x-transition
    >
        <div class="bg-slate-900 border border-white/10 rounded-3xl p-6 max-w-sm w-full shadow-2xl text-center">
            <div class="w-12 h-12 rounded-full bg-indigo-500/10 text-indigo-400 flex items-center justify-center mx-auto mb-4 text-xl">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <p class="text-sm text-slate-200 mb-6" x-text="alertMessage"></p>
            <button 
                @click="alertMessage = ''" 
                class="w-full py-2.5 rounded-xl bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-bold transition-colors"
            >
                Mengerti
            </button>
        </div>
    </div>

    <script>
        function portfolioApp() {
            return {
                isEditing: false,
                alertMessage: '',
                currentTheme: 0,
                
                // Rich Background Theme Palettes
                themes: [
                    { name: 'Midnight', class: 'theme-gradient-purple', dotClass: 'bg-purple-600' },
                    { name: 'Emerald', class: 'theme-gradient-emerald', dotClass: 'bg-emerald-600' },
                    { name: 'Sunset Glow', class: 'theme-gradient-sunset', dotClass: 'bg-rose-600' },
                    { name: 'Classic Dark', class: 'theme-gradient-dark', dotClass: 'bg-slate-700' }
                ],

                // Profile state
                profile: {
                    name: 'BUDIJOI',
                    bio: 'Kreator Digital & Pengembang Web yang berspesialisasi dalam membangun pengalaman digital interaktif bernilai estetika tinggi.',
                    avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=256&q=80'
                },

                // Default List of Links
                links: [
                    {
                        id: 1,
                        title: 'Portofolio Utama',
                        description: 'Lihat koleksi proyek visual, animasi web 3D, dan desain UI terkini.',
                        url: 'https://budijoi.com/portfolio'
                    },
                    {
                        id: 2,
                        title: 'YouTube Creator Channel',
                        description: 'Eksperimen desain web, tips karier digital, dan tutorial kreatif.',
                        url: 'https://youtube.com'
                    },
                    {
                        id: 3,
                        title: 'Koleksi Foto Digital',
                        description: 'Jelajahi jepretan lanskap perkotaan & seni fotografi jalanan 2026.',
                        url: 'https://instagram.com'
                    },
                    {
                        id: 4,
                        title: 'Hubungi Bisnis & Kolaborasi',
                        description: 'Bicarakan projek hebat atau buat jadwal konsultasi portofolio.',
                        url: 'mailto:hello@budijoi.com'
                    }
                ],

                // Initialize component (loads data from local storage if available)
                init() {
                    const savedProfile = localStorage.getItem('budijoi_profile');
                    const savedLinks = localStorage.getItem('budijoi_links');
                    const savedTheme = localStorage.getItem('budijoi_theme');

                    if (savedProfile) {
                        this.profile = JSON.parse(savedProfile);
                    }
                    if (savedLinks) {
                        this.links = JSON.parse(savedLinks);
                    }
                    if (savedTheme) {
                        this.currentTheme = parseInt(savedTheme, 10);
                    }
                },

                // Toggle Edit / Preview Mode
                toggleEditMode() {
                    this.isEditing = !this.isEditing;
                    if (!this.isEditing) {
                        this.saveToLocalStorage();
                        this.alertMessage = "Semua perubahan portofolio Anda telah tersimpan dengan aman ke perangkat!";
                    }
                },

                // Save data to browser local storage
                saveToLocalStorage() {
                    localStorage.setItem('budijoi_profile', JSON.stringify(this.profile));
                    localStorage.setItem('budijoi_links', JSON.stringify(this.links));
                    localStorage.setItem('budijoi_theme', this.currentTheme.toString());
                },

                // Prompt user to update Avatar URL
                editAvatarPrompt() {
                    const newUrl = prompt("Masukkan alamat URL gambar baru untuk avatar Anda:", this.profile.avatar);
                    if (newUrl !== null && newUrl.trim() !== "") {
                        this.profile.avatar = newUrl.trim();
                        this.saveToLocalStorage();
                    }
                },

                // Add a new empty link to the list
                addNewLink() {
                    const newId = Date.now();
                    this.links.push({
                        id: newId,
                        title: 'Tautan Baru Anda',
                        description: 'Tulis deskripsi pendek yang menarik di sini.',
                        url: 'https://budijoi.com'
                    });
                    this.saveToLocalStorage();
                },

                // Delete selected link
                deleteLink(id) {
                    if (confirm("Apakah Anda yakin ingin menghapus tautan ini?")) {
                        this.links = this.links.filter(link => link.id !== id);
                        this.saveToLocalStorage();
                    }
                },

                // Move link up in hierarchy order
                moveLinkUp(index) {
                    if (index > 0) {
                        const temp = this.links[index];
                        this.links[index] = this.links[index - 1];
                        this.links[index - 1] = temp;
                        this.saveToLocalStorage();
                    }
                },

                // Move link down in hierarchy order
                moveLinkDown(index) {
                    if (index < this.links.length - 1) {
                        const temp = this.links[index];
                        this.links[index] = this.links[index + 1];
                        this.links[index + 1] = temp;
                        this.saveToLocalStorage();
                    }
                },

                // Helper to return elegant FontAwesome icons automatically based on URL keyword matches
                getIconClass(url) {
                    const cleanUrl = url.toLowerCase();
                    if (cleanUrl.includes('youtube.com') || cleanUrl.includes('youtu.be')) return 'fa-brands fa-youtube text-rose-500';
                    if (cleanUrl.includes('instagram.com')) return 'fa-brands fa-instagram text-pink-500';
                    if (cleanUrl.includes('github.com')) return 'fa-brands fa-github text-slate-300';
                    if (cleanUrl.includes('twitter.com') || cleanUrl.includes('x.com')) return 'fa-brands fa-x-twitter text-slate-100';
                    if (cleanUrl.includes('facebook.com')) return 'fa-brands fa-facebook text-blue-500';
                    if (cleanUrl.includes('linkedin.com')) return 'fa-brands fa-linkedin text-blue-400';
                    if (cleanUrl.includes('mailto:')) return 'fa-solid fa-envelope text-amber-400';
                    if (cleanUrl.includes('dribbble.com')) return 'fa-brands fa-dribbble text-rose-400';
                    if (cleanUrl.includes('behance.net')) return 'fa-brands fa-behance text-blue-600';
                    
                    // Default fallback icon
                    return 'fa-solid fa-arrow-up-right-from-square text-indigo-400';
                },

                // Copy entire JSON configuration code to clipboard for user backups
                copyConfigToClipboard() {
                    const data = {
                        profile: this.profile,
                        links: this.links,
                        currentTheme: this.currentTheme
                    };
                    const jsonString = JSON.stringify(data, null, 2);
                    
                    // Standard reliable copy fallback method
                    const tempTextArea = document.createElement("textarea");
                    tempTextArea.value = jsonString;
                    document.body.appendChild(tempTextArea);
                    tempTextArea.select();
                    try {
                        document.execCommand('copy');
                        this.alertMessage = "Salinan berhasil! Kode JSON konfigurasi tersimpan di clipboard Anda. Simpan catatan ini aman.";
                    } catch (err) {
                        this.alertMessage = "Gagal menyalin konfigurasi.";
                    }
                    document.body.removeChild(tempTextArea);
                },

                // Import config from JSON
                importConfigPrompt() {
                    const inputJson = prompt("Tempel (Paste) kode JSON portofolio Anda di bawah ini:");
                    if (inputJson) {
                        try {
                            const parsedData = JSON.parse(inputJson);
                            if (parsedData.profile && parsedData.links) {
                                this.profile = parsedData.profile;
                                this.links = parsedData.links;
                                if (typeof parsedData.currentTheme === 'number') {
                                    this.currentTheme = parsedData.currentTheme;
                                }
                                this.saveToLocalStorage();
                                this.alertMessage = "Portofolio berhasil diimpor! Data Anda telah diperbarui.";
                            } else {
                                this.alertMessage = "Gagal mengimpor. Format JSON tidak sesuai struktur data portofolio.";
                            }
                        } catch (e) {
                            this.alertMessage = "Format JSON tidak valid. Periksa kembali teks yang dimasukkan.";
                        }
                    }
                }
            }
        }
    </script>
</body>
