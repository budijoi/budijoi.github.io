<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>budijoi · Profil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 32px 24px 24px; flex: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #30363d;
      margin-bottom: 28px;
    }
    .topbar .brand { font-size: 18px; font-weight: 700; color: #e6edf3; text-decoration: none; }
    .topbar .brand:hover { color: #58a6ff; }
    .topbar nav { display: flex; gap: 6px; }
    .topbar nav a {
      padding: 8px 16px;
      border-radius: 8px;
      color: #8b949e;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all .2s;
    }
    .topbar nav a:hover { background: #21262d; color: #e6edf3; }
    .topbar nav a.active { background: #1f6feb; color: #fff; }

    .profile-card {
      background: #151b23;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 36px;
      text-align: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #30363d;
      margin-bottom: 16px;
    }
    .profile-card h1 { font-size: 26px; font-weight: 600; }
    .profile-card .bio { color: #8b949e; font-size: 15px; margin-top: 6px; }
    .profile-card .detail-row {
      color: #8b949e;
      font-size: 14px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .profile-card .detail-row svg { fill: #8b949e; flex-shrink: 0; }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
    }
    .stats-row .stat { text-align: center; }
    .stats-row .stat .num { font-size: 22px; font-weight: 600; color: #e6edf3; }
    .stats-row .stat .label { font-size: 13px; color: #8b949e; margin-top: 2px; }

    .section { margin-top: 28px; }
    .section h2 { font-size: 17px; font-weight: 600; margin-bottom: 14px; color: #e6edf3; }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .social-links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 18px;
      color: #e6edf3;
      text-decoration: none;
      font-size: 14px;
      transition: border-color .2s;
    }
    .social-links a:hover { border-color: #58a6ff; }
    .social-links a svg { width: 20px; height: 20px; fill: #e6edf3; flex-shrink: 0; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .contact-item svg { width: 20px; height: 20px; fill: #8b949e; flex-shrink: 0; }
    .contact-item .info { font-size: 14px; }
    .contact-item .info .label { color: #8b949e; font-size: 12px; }
    .contact-item .info .value { color: #e6edf3; margin-top: 1px; }
    .contact-item a { color: #58a6ff; text-decoration: none; }
    .contact-item a:hover { text-decoration: underline; }

    .loading { text-align: center; color: #8b949e; padding: 60px 0; }
    .loading .spinner {
      width: 30px; height: 30px; border: 3px solid #30363d;
      border-top-color: #58a6ff; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f85149; text-align: center; padding: 60px 0; }

    footer { text-align: center; padding: 24px; color: #484f58; font-size: 13px; }
    footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html" class="brand">budijoi</a>
      <nav>
        <a href="index.html">Repositori</a>
        <a href="profile.html" class="active">Profil</a>
      </nav>
    </div>

    <div id="profile-content">
      <div class="loading">
        <div class="spinner"></div>
        Memuat profil...
      </div>
    </div>
  </div>
  <footer>
    <a href="https://github.com/budijoi">github.com/budijoi</a>
  </footer>

  <script>
    (async () => {
      const el = document.getElementById('profile-content');

      try {
        const [userRes, socialRes] = await Promise.all([
          fetch('https://api.github.com/users/budijoi'),
          fetch('https://api.github.com/users/budijoi/social_accounts')
        ]);
        if (!userRes.ok) throw new Error('Gagal memuat profil');
        const user = await userRes.json();
        let socialAccounts = [];
        if (socialRes.ok) socialAccounts = await socialRes.json();

        el.innerHTML = buildProfile(user, socialAccounts);
      } catch (e) {
        el.innerHTML = '<div class="error">Gagal memuat profil. Coba lagi nanti.</div>';
        console.error(e);
      }
    })();

    function buildProfile(user, socialAccounts) {
      const avatar = user.avatar_url;
      const name = user.name || user.login;
      const login = user.login;
      const bio = user.bio || '';
      const location = user.location || '';
      const blog = user.blog || '';
      const company = user.company || '';
      const twitter = user.twitter_username || '';
      const ghUrl = user.html_url;

      let socialLinksHtml = '';

      socialLinksHtml += `
        <a href="${ghUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>`;

      if (blog) {
        socialLinksHtml += `
          <a href="${blog}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M10 4v2H6v12h12v-4h2v6H4V4h6zm2 0h8v8h-2V7.41l-9.29 9.3-1.42-1.42L16.59 6H12V4z"/></svg>
            Website
          </a>`;
      }

      socialLinksHtml += `
        <a href="https://facebook.com/budijoiBBJ" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </a>
        <a href="https://instagram.com/budijoi_eco" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          Instagram
        </a>
        <a href="https://threads.com/budijoi_eco" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M14.242 11.576c-.79-.4-1.306-.66-1.306-1.22 0-.443.347-.89.931-.89.557 0 .886.383 1.005.67.127.308.513.45.813.31l.02-.01a.567.567 0 00.344-.565c-.046-1.092-.927-2.22-2.513-2.22-1.581 0-2.604.95-2.604 2.275 0 1.518 1.163 2.19 2.025 2.601.775.37 1.222.632 1.222 1.137 0 .716-.66.966-1.158.966-.802 0-1.135-.445-1.295-.821-.2-.403-.664-.53-.996-.347l-.021.012c-.41.228-.51.695-.37 1.087.392 1.094 1.38 1.967 2.682 1.967 1.573 0 2.931-1.05 2.931-2.744 0-1.759-1.066-2.458-2.012-2.948zm-1.518 7.213c-2.39 0-4.027-1.418-5.002-2.325-.74-.69-1.066-1.227-1.066-1.227l-.003-.003c-1.123 1.332-2.633 2.235-3.858 2.556-.518.136-.931.21-1.208.24v1.637c0 1.102.898 2 2 2h18c1.102 0 2-.898 2-2v-1.855c-1.944.742-4.654 1.67-6.35 1.804-1.462.116-2.976.173-3.513.173zM2 8.5C2 5.462 4.238 3 7 3h3.5l2 2H14c2.762 0 5 2.462 5 5.5v1.588c.646.454 1.004.97 1.004 1.588v.324c0 .618-.358 1.134-1.004 1.588V15.5c0 2.21-2.014 4-4.5 4h-7C5.014 19.5 3 17.71 3 15.5v-2.912c0-.618.358-1.134 1.004-1.588V8.5z"/></svg>
          Threads
        </a>
        <a href="https://youtube.com/@budijoi" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          YouTube
        </a>`;

      const joinDate = new Date(user.created_at).toLocaleDateString('id-ID', { year: 'numeric', month: 'long' });

      return `
        <div class="profile-card">
          <img class="avatar" src="${avatar}" alt="${login}" loading="lazy">
          <h1>${escHtml(name)}</h1>
          <div class="bio">${bio ? escHtml(bio) : ''}</div>
          ${location ? `<div class="detail-row">📍 ${escHtml(location)}</div>` : ''}
          ${company ? `<div class="detail-row" style="margin-top:2px;">🏢 ${escHtml(company)}</div>` : ''}

          <div class="stats-row">
            <div class="stat"><div class="num">${user.public_repos}</div><div class="label">Repositori</div></div>
            <div class="stat"><div class="num">${user.followers}</div><div class="label">Pengikut</div></div>
            <div class="stat"><div class="num">${user.following}</div><div class="label">Mengikuti</div></div>
          </div>
        </div>

        ${socialLinksHtml ? `
        <div class="section">
          <h2>Media Sosial</h2>
          <div class="social-links">${socialLinksHtml}</div>
        </div>` : ''}

        <div class="section">
          <h2>Kontak & Info</h2>
          <div class="contact-item">
            <svg viewBox="0 0 16 16"><path d="M1.75 2h12.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0114.25 14H1.75A1.75 1.75 0 010 12.25v-8.5C0 2.784.784 2 1.75 2zM1.5 2.5v.44l6.5 4.5 6.5-4.5v-.44a.25.25 0 00-.25-.25H1.75a.25.25 0 00-.25.25zm13 .813L8.22 7.69a.75.75 0 01-.44 0L1.5 3.313v8.937c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V3.313z"/></svg>
            <div class="info">
              <div class="label">GitHub</div>
              <div class="value"><a href="${ghUrl}" target="_blank">${ghUrl}</a></div>
            </div>
          </div>
          ${blog ? `
          <div class="contact-item">
            <svg viewBox="0 0 24 24"><path d="M10 4v2H6v12h12v-4h2v6H4V4h6zm2 0h8v8h-2V7.41l-9.29 9.3-1.42-1.42L16.59 6H12V4z"/></svg>
            <div class="info">
              <div class="label">Website</div>
              <div class="value"><a href="${blog}" target="_blank">${escHtml(blog)}</a></div>
            </div>
          </div>` : ''}
          ${location ? `
          <div class="contact-item">
            <svg viewBox="0 0 16 16"><path d="M8 0C4.14 0 1 3.14 1 7c0 5.25 7 9 7 9s7-3.75 7-9c0-3.86-3.14-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
            <div class="info">
              <div class="label">Lokasi</div>
              <div class="value">${escHtml(location)}</div>
            </div>
          </div>` : ''}
          <div class="contact-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            <div class="info">
              <div class="label">Email</div>
              <div class="value"><a href="mailto:admin@budijoi.my.id">admin@budijoi.my.id</a></div>
            </div>
          </div>
          <div class="contact-item">
            <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            <div class="info">
              <div class="label">Bergabung</div>
              <div class="value">${joinDate}</div>
            </div>
          </div>
        </div>
      `;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
